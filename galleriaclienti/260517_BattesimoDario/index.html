<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Luigi Mastroianni — Selezione Foto</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#111;--surface:#1a1a1a;--surface2:#222;--border:#2a2a2a;
  --text:#e8e8e8;--muted:#888;--accent:#c8a96e;--accent2:#a07840;
  --yes:#3a7a4a;--yes-h:#2d6139;--no:#7a3a3a;--no-h:#612d2d;
  --radius:10px;--trans:180ms cubic-bezier(.16,1,.3,1);
}
body{background:var(--bg);color:var(--text);font-family:'Helvetica Neue',Arial,sans-serif;min-height:100dvh}

/* ── HEADER ── */
header{padding:1.25rem 1.5rem .75rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem}
.logo{font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);font-weight:600}
.hinfo h1{font-size:1.1rem;font-weight:600}
.hstats{display:flex;gap:.75rem;font-size:.8rem}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:.35rem .75rem;text-align:center}
.stat-n{font-size:1rem;font-weight:700;color:var(--accent)}
.stat-l{color:var(--muted);font-size:.65rem;margin-top:.1rem}

/* ── ISTRUZIONI ── */
.instructions{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin:1.25rem 1.5rem;padding:.9rem 1.1rem;font-size:.82rem;color:var(--muted);line-height:1.6}
.instructions b{color:var(--text)}

/* ── GRIGLIA ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;padding:0 1.5rem 6rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:transform var(--trans),box-shadow var(--trans)}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.4)}
.thumb-wrap{position:relative;aspect-ratio:3/2;overflow:hidden;cursor:zoom-in;background:#0a0a0a}
.thumb{width:100%;height:100%;object-fit:cover;transition:transform var(--trans)}
.thumb:hover{transform:scale(1.03)}
.badge{position:absolute;top:8px;right:8px;padding:.22rem .5rem;border-radius:20px;font-size:.65rem;font-weight:700;letter-spacing:.04em;opacity:0;transition:opacity var(--trans)}
.badge.show{opacity:1}
.badge-yes{background:#2d6139;color:#7fffaa}
.badge-no{background:#612d2d;color:#ffaaaa}
.card-body{padding:.65rem}
.fname{font-size:.65rem;color:var(--muted);margin-bottom:.5rem;word-break:break-all}
.btns{display:grid;grid-template-columns:1fr 1fr;gap:.35rem;margin-bottom:.5rem}
.btn{padding:.45rem;border:none;border-radius:6px;font-size:.78rem;font-weight:600;cursor:pointer;transition:background var(--trans),transform var(--trans)}
.btn:active{transform:scale(.97)}
.btn-yes{background:var(--yes);color:#fff}
.btn-yes:hover{background:var(--yes-h)}
.btn-yes.active{background:#4caf70;box-shadow:0 0 0 2px #7fffaa55}
.btn-no{background:var(--no);color:#fff}
.btn-no:hover{background:var(--no-h)}
.btn-no.active{background:#e05555;box-shadow:0 0 0 2px #ffaaaa55}
.note{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:.72rem;padding:.35rem .55rem;resize:none;font-family:inherit;transition:border-color var(--trans)}
.note:focus{outline:none;border-color:var(--accent)}

/* ── FAB ── */
.fab{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--accent);color:#111;border:none;border-radius:50px;padding:.7rem 1.3rem;font-size:.88rem;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(200,169,110,.35);transition:background var(--trans),transform var(--trans);z-index:100}
.fab:hover{background:var(--accent2);transform:translateY(-2px)}

/* ── MODAL ── */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity var(--trans)}
.modal.on{opacity:1;pointer-events:all}
.mbox{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.75rem;max-width:520px;width:90%;max-height:80vh;overflow-y:auto}
.mbox h2{font-size:1.05rem;margin-bottom:.4rem;color:var(--accent)}
.mbox p{font-size:.8rem;color:var(--muted);margin-bottom:1rem}
.mlist{font-size:.78rem;color:var(--text);line-height:1.8;margin-bottom:1.1rem;white-space:pre-wrap;word-break:break-all}
.macts{display:flex;gap:.65rem;flex-wrap:wrap}
.mbtn{flex:1;padding:.6rem .9rem;border:none;border-radius:8px;font-size:.82rem;font-weight:600;cursor:pointer;transition:background var(--trans)}
.mbtn-wa{background:#25d366;color:#fff}.mbtn-wa:hover{background:#1da851}
.mbtn-copy{background:var(--surface2);color:var(--text);border:1px solid var(--border)}.mbtn-copy:hover{background:var(--border)}
.mbtn-close{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}.mbtn-close:hover{background:var(--border)}

/* ── LIGHTBOX ── */
.lb{
  position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:300;
  display:none;flex-direction:column;align-items:center;justify-content:center;
  touch-action:pan-y;
}
.lb.on{display:flex}

/* immagine con transizione slide */
.lb-img-wrap{
  position:relative;width:100%;flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;
}
.lb-img-wrap img{
  max-width:90vw;max-height:72vh;object-fit:contain;border-radius:6px;
  transition:transform .22s cubic-bezier(.16,1,.3,1),opacity .18s;
  will-change:transform;
  user-select:none;-webkit-user-drag:none;
}

/* barra superiore */
.lb-top{
  width:100%;display:flex;align-items:center;justify-content:space-between;
  padding:.75rem 1rem;gap:.5rem;
}
.lb-counter{font-size:.78rem;color:var(--muted)}
.lb-fname{font-size:.75rem;color:var(--muted);flex:1;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lb-close-btn{background:rgba(255,255,255,.08);border:none;color:#fff;font-size:1rem;padding:.35rem .7rem;cursor:pointer;border-radius:8px;transition:background var(--trans)}
.lb-close-btn:hover{background:rgba(255,255,255,.18)}

/* barra inferiore: voto + navigazione */
.lb-bottom{
  width:100%;display:flex;align-items:center;justify-content:center;
  padding:.9rem 1rem 1.25rem;gap:.75rem;
}
.lb-nav-btn{
  background:rgba(255,255,255,.07);border:none;color:#fff;
  font-size:1.4rem;padding:.5rem .9rem;cursor:pointer;border-radius:10px;
  transition:background var(--trans);flex-shrink:0;
}
.lb-nav-btn:hover{background:rgba(255,255,255,.18)}
.lb-vote-btns{display:flex;gap:.6rem;flex:1;max-width:340px}
.lb-btn-yes,.lb-btn-no{
  flex:1;padding:.7rem;border:none;border-radius:10px;
  font-size:1rem;font-weight:700;cursor:pointer;
  transition:background var(--trans),transform var(--trans),box-shadow var(--trans);
}
.lb-btn-yes:active,.lb-btn-no:active{transform:scale(.95)}
.lb-btn-yes{background:var(--yes);color:#fff}
.lb-btn-yes:hover{background:var(--yes-h)}
.lb-btn-yes.active{background:#4caf70;box-shadow:0 0 0 3px #7fffaa55}
.lb-btn-no{background:var(--no);color:#fff}
.lb-btn-no:hover{background:var(--no-h)}
.lb-btn-no.active{background:#e05555;box-shadow:0 0 0 3px #ffaaaa55}

.instr-title{font-size:.88rem;font-weight:700;color:var(--accent);margin-bottom:.85rem;letter-spacing:.03em}
.instr-steps{display:flex;flex-direction:column;gap:.55rem;margin-bottom:.85rem}
.instr-step{display:flex;align-items:flex-start;gap:.65rem;font-size:.82rem;color:var(--text);line-height:1.5}
.instr-num{
  min-width:22px;height:22px;border-radius:50%;
  background:var(--accent);color:#111;
  font-size:.7rem;font-weight:800;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:.05rem;
}
.instr-tip{font-size:.78rem;color:var(--muted);border-top:1px solid var(--border);padding-top:.75rem;line-height:1.5}
.instr-tip b{color:var(--text)}

/* swipe hint su mobile */
.lb-hint{font-size:.65rem;color:var(--muted);position:absolute;bottom:.35rem;left:50%;transform:translateX(-50%);opacity:.5;pointer-events:none}

@media(max-width:500px){
  header{flex-direction:column;align-items:flex-start}
  .grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:7px;padding:0 .75rem 5rem}
  .fab{bottom:1rem;right:1rem}
  .lb-img-wrap img{max-width:95vw;max-height:65vh}
  .lb-bottom{padding:.75rem .5rem 1rem;gap:.4rem}
  .lb-nav-btn{font-size:1.1rem;padding:.45rem .65rem}
}
</style>
</head>

var state  = {};
var lbIdx  = 0;
var isTouch = ('ontouchstart' in window);

// ── STATE ──────────────────────────────────────────────────────────────────
function loadState() {
  try { var s=localStorage.getItem('sel_'+CONFIG.storage); if(s) state=JSON.parse(s); } catch(e){}
  CONFIG.foto.forEach(function(f){ if(!state[f.id]) state[f.id]={vote:null,note:''}; });
}
function saveState() {
  try { localStorage.setItem('sel_'+CONFIG.storage, JSON.stringify(state)); } catch(e){}
}
function updateStats() {
  var yes=0,no=0;
  CONFIG.foto.forEach(function(f){ if(state[f.id].vote==='yes') yes++; else if(state[f.id].vote==='no') no++; });
  document.getElementById('cnt-tot').textContent=CONFIG.foto.length;
  document.getElementById('cnt-yes').textContent=yes;
  document.getElementById('cnt-no').textContent=no;
}

// ── VOTE ───────────────────────────────────────────────────────────────────
function vote(id,v) {
  state[id].vote = state[id].vote===v ? null : v;
  saveState(); renderCard(id); updateStats();
}
function setNote(id,val){ state[id].note=val; saveState(); }

// ── GRID ───────────────────────────────────────────────────────────────────
function escHtml(t){ return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function renderCard(id) {
  var s=state[id];
  var card=document.getElementById('card_'+id); if(!card) return;
  var badge=card.querySelector('.badge');
  var byes=card.querySelector('.btn-yes');
  var bno=card.querySelector('.btn-no');
  badge.className='badge';
  if(s.vote==='yes'){badge.className='badge badge-yes show';badge.textContent='✓ Sì';}
  if(s.vote==='no') {badge.className='badge badge-no show'; badge.textContent='✗ No';}
  byes.className='btn btn-yes'+(s.vote==='yes'?' active':'');
  bno.className ='btn btn-no' +(s.vote==='no' ?' active':'');
}

function buildGrid() {
  document.getElementById('titolo').textContent=CONFIG.cliente;
  var g=document.getElementById('grid'); g.innerHTML='';
  CONFIG.foto.forEach(function(f,idx){
    var s=state[f.id];
    var d=document.createElement('div');
    d.className='card'; d.id='card_'+f.id;
    d.innerHTML=
      '<div class="thumb-wrap">'+
        '<img class="thumb" src="foto/'+f.file+'" alt="'+escHtml(f.original_name)+'" loading="lazy" onclick="openLb('+idx+')" width="400" height="300" draggable="false">'+
        '<div class="badge"></div>'+
      '</div>'+
      '<div class="card-body">'+
        '<div class="fname">'+escHtml(f.original_name)+'</div>'+
        '<div class="btns">'+
          '<button class="btn btn-yes" onclick="vote(\''+f.id+'\',\'yes\')">✓ Sì</button>'+
          '<button class="btn btn-no"  onclick="vote(\''+f.id+'\',\'no\')">✗ No</button>'+
        '</div>'+
        '<textarea class="note" rows="2" placeholder="Commento opzionale..." onchange="setNote(\''+f.id+'\',this.value)">'+escHtml(s.note)+'</textarea>'+
      '</div>';
    g.appendChild(d);
    renderCard(f.id);
  });
  updateStats();
}

// ── LIGHTBOX ───────────────────────────────────────────────────────────────
function openLb(idx){ lbIdx=idx; showLb(null); document.getElementById('lb').classList.add('on'); }
function closeLb()  { document.getElementById('lb').classList.remove('on'); }

function showLb(dir) {
  var f=CONFIG.foto[lbIdx];
  var s=state[f.id];
  var img=document.getElementById('lb-img');
  var wrap=document.getElementById('lb-img-wrap');

  // slide animation
  if(dir!==null){
    img.style.transition='none';
    img.style.transform='translateX('+(dir>0?'60px':'-60px')+')';
    img.style.opacity='0';
    setTimeout(function(){
      img.src='foto/'+f.file;
      img.alt=f.original_name;
      img.style.transition='';
      img.style.transform='translateX(0)';
      img.style.opacity='1';
    },60);
  } else {
    img.src='foto/'+f.file;
    img.alt=f.original_name;
    img.style.transform='translateX(0)';
    img.style.opacity='1';
  }

  document.getElementById('lb-counter').textContent=(lbIdx+1)+' / '+CONFIG.foto.length;
  document.getElementById('lb-fname').textContent=f.original_name;
  document.getElementById('lb-hint').textContent=isTouch ? 'Scorri per cambiare foto' : '';
  updateLbBtns(f.id);
}

function updateLbBtns(id){
  var v=state[id].vote;
  document.getElementById('lb-btn-yes').className='lb-btn-yes'+(v==='yes'?' active':'');
  document.getElementById('lb-btn-no').className ='lb-btn-no' +(v==='no' ?' active':'');
}

function navLb(d){
  lbIdx=(lbIdx+d+CONFIG.foto.length)%CONFIG.foto.length;
  showLb(d);
}

function lbVote(v){
  var id=CONFIG.foto[lbIdx].id;
  vote(id,v);         // aggiorna griglia + stats
  updateLbBtns(id);   // aggiorna bottoni lightbox
  // vai avanti dopo 500ms se era un voto nuovo
  if(state[id].vote!==null){
    setTimeout(function(){
      if(lbIdx<CONFIG.foto.length-1) navLb(1);
    },480);
  }
}

// Tastiera
document.addEventListener('keydown',function(e){
  if(!document.getElementById('lb').classList.contains('on')) return;
  if(e.key==='ArrowRight'||e.key==='l') navLb(1);
  if(e.key==='ArrowLeft' ||e.key==='h') navLb(-1);
  if(e.key==='y'||e.key==='Y') lbVote('yes');
  if(e.key==='n'||e.key==='N') lbVote('no');
  if(e.key==='Escape') closeLb();
});

// Swipe touch
(function(){
  var lb=document.getElementById('lb');
  var startX=0,startY=0,moved=false;
  lb.addEventListener('touchstart',function(e){
    startX=e.touches[0].clientX;
    startY=e.touches[0].clientY;
    moved=false;
  },{passive:true});
  lb.addEventListener('touchmove',function(e){
    var dx=e.touches[0].clientX-startX;
    var dy=e.touches[0].clientY-startY;
    if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>8){
      moved=true;
      e.preventDefault();
    }
  },{passive:false});
  lb.addEventListener('touchend',function(e){
    if(!moved) return;
    var dx=e.changedTouches[0].clientX-startX;
    if(Math.abs(dx)>50) navLb(dx<0?1:-1);
  });
})();

// ── MODAL ──────────────────────────────────────────────────────────────────
function buildMsg(){
  var yes=[],no=[],notes=[];
  CONFIG.foto.forEach(function(f){
    var v=state[f.id];
    var nome=f.original_name||f.file;
    if(v.vote==='yes') yes.push(nome);
    if(v.vote==='no')  no.push(nome);
    if(v.note) notes.push(nome+': '+v.note);
  });
  var msg='📸 *Selezione Foto — '+CONFIG.cliente+'*\n\n';
  msg+='✅ *SELEZIONATE* ('+yes.length+'): '+(yes.join(', ')||'—')+'\n\n';
  msg+='❌ *SCARTATE* ('+no.length+'): '+(no.join(', ')||'—');
  if(notes.length) msg+='\n\n💬 *Note:*\n'+notes.join('\n');
  return msg;
}
function openModal(){ document.getElementById('mlist').textContent=buildMsg(); document.getElementById('modal').classList.add('on'); }
function closeModal(){ document.getElementById('modal').classList.remove('on'); }
function sendWA(){ window.open('https://wa.me/'+CONFIG.whatsapp+'?text='+encodeURIComponent(buildMsg()),'_blank'); closeModal(); }
function copyText(){
  navigator.clipboard.writeText(buildMsg()).then(function(){
    var b=document.querySelector('.mbtn-copy');
    b.textContent='✓ Copiato!';
    setTimeout(function(){ b.textContent='📋 Copia testo'; },2000);
  });
}

// ── INIT ───────────────────────────────────────────────────────────────────
loadState();
buildGrid();
buildInstructions();
